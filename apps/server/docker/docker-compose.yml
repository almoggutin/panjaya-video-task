services:
    postgres:
        image: postgres:16
        environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: postgres
            POSTGRES_DB: panjaya
        ports:
            - '5432:5432'
        volumes:
            - postgres_data:/var/lib/postgresql/data
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U postgres']
            interval: 5s
            timeout: 5s
            retries: 5

    redis:
        image: redis:7-alpine
        ports:
            - '6379:6379'
        healthcheck:
            test: ['CMD', 'redis-cli', 'ping']
            interval: 5s
            timeout: 5s
            retries: 5

    minio:
        image: minio/minio
        command: server /data --console-address ":9001"
        environment:
            MINIO_ROOT_USER: minioadmin
            MINIO_ROOT_PASSWORD: minioadmin
            MINIO_NOTIFY_WEBHOOK_ENABLE_1: 'on'
            MINIO_NOTIFY_WEBHOOK_ENDPOINT_1: 'http://host.docker.internal:8000/assets/webhooks/s3-event'
            MINIO_NOTIFY_WEBHOOK_AUTH_TOKEN_1: '${WORKER_JOB_SECRET:-change-me-in-production}'
        ports:
            - '9000:9000'
            - '9001:9001'
        volumes:
            - minio_data:/data
        healthcheck:
            test: ['CMD', 'mc', 'ready', 'local']
            interval: 5s
            timeout: 5s
            retries: 5

    minio-setup:
        image: minio/mc
        depends_on:
            minio:
                condition: service_healthy
        entrypoint: >
            /bin/sh -c "
            mc alias set local http://minio:9000 minioadmin minioadmin &&
            mc mb --ignore-existing local/panjaya-dev &&
            mc anonymous set none local/panjaya-dev &&
            printf '%s' '{\"CORSRules\":[{\"AllowedHeaders\":[\"*\"],\"AllowedMethods\":[\"GET\",\"HEAD\",\"PUT\"],\"AllowedOrigins\":[\"*\"],\"MaxAgeSeconds\":3600}]}' > /tmp/cors.json &&
            mc cors set local/panjaya-dev /tmp/cors.json || true &&
            mc event rm local/panjaya-dev arn:minio:sqs::1:webhook || true &&
            mc event add local/panjaya-dev arn:minio:sqs::1:webhook --event put || true &&
            mc event ls local/panjaya-dev
            "

volumes:
    postgres_data:
    minio_data:
