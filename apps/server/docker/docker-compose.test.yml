services:
    postgres-test:
        image: postgres:16
        environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: postgres
            POSTGRES_DB: panjaya_test
        ports:
            - '5433:5432'
        tmpfs:
            - /var/lib/postgresql/data
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U postgres']
            interval: 5s
            timeout: 5s
            retries: 5

    redis-test:
        image: redis:7-alpine
        ports:
            - '6380:6379'
        tmpfs:
            - /data
        healthcheck:
            test: ['CMD', 'redis-cli', 'ping']
            interval: 5s
            timeout: 5s
            retries: 5

    minio-test:
        image: minio/minio
        command: server /data --console-address ":9101"
        environment:
            MINIO_ROOT_USER: minioadmin
            MINIO_ROOT_PASSWORD: minioadmin
        ports:
            - '9100:9000'
            - '9101:9101'
        tmpfs:
            - /data
        healthcheck:
            test: ['CMD', 'mc', 'ready', 'local']
            interval: 5s
            timeout: 5s
            retries: 5

    minio-test-setup:
        image: minio/mc
        depends_on:
            minio-test:
                condition: service_healthy
        entrypoint: >
            /bin/sh -c "
            mc alias set local http://minio-test:9000 minioadmin minioadmin &&
            mc mb --ignore-existing local/panjaya-test &&
            mc anonymous set none local/panjaya-test
            "
