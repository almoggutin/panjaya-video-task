version: 2

updates:
    # npm dependencies
    - package-ecosystem: 'npm'
      directory: '/'
      schedule:
          interval: 'weekly'
          day: 'sunday'
          time: '06:00'
          timezone: 'Asia/Jerusalem'
      target-branch: 'develop'
      open-pull-requests-limit: 10
      commit-message:
          prefix: 'chore'
      groups:
          production-minor-patch:
              dependency-type: 'production'
              update-types:
                  - 'minor'
                  - 'patch'
          dev-dependencies:
              dependency-type: 'development'
              update-types:
                  - 'minor'
                  - 'patch'
      ignore:
          - dependency-name: '*'
            update-types:
                - 'version-update:semver-major'

    # Python dependencies (Poetry)
    - package-ecosystem: 'pip'
      directory: '/'
      schedule:
          interval: 'weekly'
          day: 'sunday'
          time: '06:00'
          timezone: 'Asia/Jerusalem'
      target-branch: 'develop'
      open-pull-requests-limit: 10
      commit-message:
          prefix: 'chore'

    # Dockerfile base image
    - package-ecosystem: 'docker'
      directory: '/'
      schedule:
          interval: 'weekly'
          day: 'sunday'
          time: '06:00'
          timezone: 'Asia/Jerusalem'
      target-branch: 'develop'
      open-pull-requests-limit: 5
      commit-message:
          prefix: 'chore'
